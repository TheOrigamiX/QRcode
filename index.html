<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video to QR Code Converter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f4f7f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        h1 {
            color: #1e293b;
            font-size: 24px;
            margin-bottom: 10px;
        }
        p.subtitle {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .dropzone {
            border: 2px dashed #cbd5e1;
            padding: 30px 20px;
            border-radius: 12px;
            background: #f8fafc;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }
        .dropzone:hover {
            border-color: #3b82f6;
            background: #eff6ff;
        }
        .dropzone p {
            color: #475569;
            font-size: 14px;
            margin-top: 10px;
        }
        input[type="file"] {
            display: none;
        }
        button {
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 20px;
            width: 100%;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #2563eb;
        }
        button:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
        }
        #status {
            margin-top: 15px;
            font-size: 14px;
            color: #2563eb;
            font-weight: 500;
        }
        #qrContainer {
            margin-top: 25px;
            display: none;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.5s ease;
        }
        #qrcode {
            padding: 15px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            margin-bottom: 15px;
        }
        .download-btn {
            background-color: #10b981;
            margin-top: 10px;
        }
        .download-btn:hover {
            background-color: #059669;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .file-info {
            font-size: 13px;
            color: #0f172a;
            margin-top: 5px;
            font-weight: bold;
            word-break: break-all;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>แปลงวิดีโอเป็น QR Code</h1>
    <p class="subtitle">อัปโหลดไฟล์วิดีโอของคุณเพื่อสร้างคิวอาร์โค้ดทันที (ฟรี ไม่ต้องผูกบัตรเครดิต)</p>
    
    <div class="dropzone" onclick="document.getElementById('videoInput').click()">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin: 0 auto;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
        <p id="uploadLabel">คลิกที่นี่เพื่อเลือกไฟล์วิดีโอ</p>
        <div id="fileInfo" class="file-info"></div>
    </div>
    
    <input type="file" id="videoInput" accept="video/*" onchange="handleFileChange()">
    <button id="submitBtn" onclick="uploadVideo()">สร้าง QR Code</button>
    
    <p id="status"></p>
    
    <div id="qrContainer">
        <div id="qrcode"></div>
        <button class="download-btn" onclick="downloadQR()">📥 บันทึกรูปภาพ QR Code</button>
    </div>
</div>

<script>
let selectedFile = null;

// ฟังก์ชันทำงานเมื่อผู้ใช้เลือกไฟล์วิดีโอ
function handleFileChange() {
    const fileInput = document.getElementById('videoInput');
    const uploadLabel = document.getElementById('uploadLabel');
    const fileInfo = document.getElementById('fileInfo');
    
    if (fileInput.files.length > 0) {
        selectedFile = fileInput.files[0];
        uploadLabel.innerText = "เปลี่ยนไฟล์วิดีโอ:";
        fileInfo.innerText = selectedFile.name + " (" + (selectedFile.size / (1024 * 1024)).toFixed(2) + " MB)";
    }
}

// ฟังก์ชันอัปโหลดและสร้าง QR Code
async function uploadVideo() {
    const statusText = document.getElementById('status');
    const qrContainer = document.getElementById('qrContainer');
    const qrDiv = document.getElementById('qrcode');
    const submitBtn = document.getElementById('submitBtn');
    
    if (!selectedFile) {
        alert("กรุณาเลือกไฟล์วิดีโอก่อนครับ!");
        return;
    }

    // ล้างค่าแสดงผลเก่าออกก่อน
    qrDiv.innerHTML = "";
    qrContainer.style.display = "none";
    statusText.innerText = "กำลังอัปโหลดวิดีโอไปยังเซิร์ฟเวอร์ฝากไฟล์ฟรี... (โปรดรอสักครู่)";
    submitBtn.disabled = true;

    // เตรียมไฟล์ส่งไปยัง API ของ tmpfiles.org
    const formData = new FormData();
    formData.append("file", selectedFile);

    try {
        const response = await fetch("https://tmpfiles.org/api/v1/upload", {
            method: "POST",
            body: formData
        });

        if (!response.ok) throw new Error("เซิร์ฟเวอร์เกิดข้อผิดพลาด");

        const data = await response.json();
        let videoURL = data.data.url;
        
        // แปลงลิงก์ของหน้าเว็บปกติ ให้กลายเป็นลิงก์ตรงสำหรับเปิดไฟล์วิดีโอทันที (Direct Link)
        videoURL = videoURL.replace("https://tmpfiles.org/", "https://tmpfiles.org/dl/");

        statusText.innerText = "🎉 อัปโหลดสำเร็จ! กำลังสร้าง QR Code...";
        
        // สั่งสร้าง QR Code จากลิงก์ตรงของวิดีโอ
        new QRCode(qrDiv, {
            text: videoURL,
            width: 200,
            height: 200,
            correctLevel : QRCode.CorrectLevel.H
        });
        
        statusText.innerText = "เสร็จเรียบร้อย! สแกนเพื่อเปิดดูวิดีโอได้เลย";
        qrContainer.style.display = "flex";

    } catch (error) {
        console.error(error);
        statusText.innerText = "❌ เกิดข้อผิดพลาด: ไม่สามารถอัปโหลดได้ (ไฟล์อาจใหญ่เกินไป หรืออินเทอร์เน็ตขัดข้อง)";
    } finally {
        submitBtn.disabled = false;
    }
}

// ฟังก์ชันกดดาวน์โหลดรูปภาพ QR Code
function downloadQR() {
    const qrImg = document.querySelector('#qrcode img');
    if (!qrImg) {
        alert("ไม่พบรูปภาพ QR Code");
        return;
    }
    const link = document.createElement('a');
    link.href = qrImg.src;
    link.download = 'video-qrcode.png';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}
</script>

</body>
</html>
